name: Verify blueprint artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'blueprint/**'
      - '.github/workflows/blueprint.yml'
      - '.github/workflows/pages-static.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify_artifacts:
    runs-on: ubuntu-latest
    name: Verify committed blueprint files
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Verify committed blueprint artifacts
        run: |
          set -euo pipefail
          test -f blueprint/src/print.pdf
          test -f blueprint/web/index.html
          test -f blueprint/web/dep_graph_document.html
          test -d blueprint/web/js
          test -d blueprint/web/styles
